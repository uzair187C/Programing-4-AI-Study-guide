<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI271 — Programming for AI | Midterm Study Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a38;
    --text: #e2dff5;
    --muted: #6b6880;
    --nb1: #f97316;
    --nb2: #a855f7;
    --nb3: #22c55e;
    --nb4: #3b82f6;
    --nb5: #ec4899;
    --correct: #166534;
    --correct-border: #22c55e;
    --wrong: #7f1d1d;
    --wrong-border: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: linear-gradient(135deg, #0d0d1a 0%, #12122a 60%, #0d1b2a 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 0;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; }
  .course-tag {
    font-family:'JetBrains Mono', monospace;
    font-size:10px; letter-spacing:3px;
    color: var(--muted); text-transform:uppercase;
  }
  header h1 {
    font-family:'Syne', sans-serif;
    font-size:clamp(18px,3vw,26px);
    font-weight:800; color:#fff;
    letter-spacing:-0.5px;
  }
  .subtitle { font-size:12px; color:var(--muted); margin-top:4px; }

  .tab-bar {
    display:flex; gap:2px; margin-top:20px;
  }
  .tab-btn {
    padding:10px 20px;
    background:transparent; border:none;
    border-bottom:2px solid transparent;
    color:var(--muted);
    font-family:'Inter',sans-serif;
    font-size:13px; font-weight:600;
    cursor:pointer; transition:all .2s;
    letter-spacing:.3px;
  }
  .tab-btn:hover { color:var(--text); }
  .tab-btn.active { color:#fff; border-bottom-color:#fff; }

  /* ─── LAYOUT ─── */
  .layout { display:flex; min-height:calc(100vh - 110px); }

  /* ─── SIDEBAR ─── */
  aside {
    width:230px; flex-shrink:0;
    border-right:1px solid var(--border);
    padding:16px 0;
    position:sticky; top:110px;
    height:calc(100vh - 110px);
    overflow-y:auto;
  }
  .nb-btn {
    display:block; width:100%;
    padding:11px 16px;
    background:transparent; border:none;
    border-left:3px solid transparent;
    color:var(--muted);
    font-family:'Inter',sans-serif;
    font-size:12px; text-align:left;
    cursor:pointer; transition:all .15s;
    line-height:1.4;
  }
  .nb-btn:hover { color:var(--text); background:#ffffff08; }
  .nb-btn.active { color:#fff; background:#ffffff0a; }
  .nb-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:2px; }
  .nb-title { font-weight:600; }

  /* ─── MAIN CONTENT ─── */
  main { flex:1; padding:28px 36px; max-width:820px; overflow-x:hidden; }

  .topic-header { margin-bottom:24px; }
  .topic-nb-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
  .topic-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; color:#fff; }

  /* Section pills */
  .section-pills { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:22px; }
  .pill-btn {
    padding:5px 11px; border-radius:5px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:11px; cursor:pointer;
    transition:all .15s;
  }
  .pill-btn:hover { color:var(--text); border-color:#444; }
  .pill-btn.active { font-weight:600; }

  /* Section card */
  .section-heading {
    font-family:'Syne',sans-serif;
    font-size:17px; font-weight:700; color:#fff;
    padding-bottom:10px; margin-bottom:16px;
    border-bottom:2px solid;
  }

  /* Code block */
  .code-block {
    background:#0d0d16;
    border:1px solid var(--border);
    border-radius:10px;
    padding:20px 22px;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px; line-height:1.8;
    color:#c9c4e8;
    overflow-x:auto;
    white-space:pre;
    tab-size:4;
    position:relative;
  }
  .code-block .cm  { color:#6272a4; } /* comments */
  .code-block .kw  { color:#ff79c6; } /* keywords */
  .code-block .fn  { color:#50fa7b; } /* functions */
  .code-block .st  { color:#f1fa8c; } /* strings */
  .code-block .nm  { color:#bd93f9; } /* numbers */
  .code-block .op  { color:#ff79c6; } /* operators */
  .code-block .ar  { color:#8be9fd; } /* arrows/output */

  /* Key note box */
  .key-note {
    margin-top:12px;
    border-radius:8px;
    padding:13px 16px;
    font-size:13px; color:#ccc;
    border-left:3px solid;
  }
  .key-note .kn-label { font-weight:700; margin-right:6px; }

  /* Nav footer */
  .nav-footer {
    display:flex; justify-content:space-between;
    align-items:center; margin-top:28px;
    padding-top:20px; border-top:1px solid var(--border);
  }
  .nav-btn {
    padding:8px 18px; border-radius:7px;
    border:1px solid var(--border);
    background:transparent; color:var(--muted);
    font-size:13px; cursor:pointer; transition:all .15s;
  }
  .nav-btn:hover:not(:disabled) { color:var(--text); border-color:#555; }
  .nav-btn:disabled { opacity:.3; cursor:default; }
  .nav-btn.primary { font-weight:600; }
  .nav-progress { font-size:12px; color:var(--muted); }

  /* ─── QUIZ ─── */
  .quiz-wrap { max-width:660px; margin:40px auto; padding:0 24px; }
  .quiz-meta { display:flex; justify-content:space-between; margin-bottom:20px; font-size:13px; color:var(--muted); }
  .progress-bar { background:var(--surface2); border-radius:4px; height:4px; margin-bottom:28px; }
  .progress-fill { height:4px; border-radius:4px; background:#fff; transition:width .3s; }
  .quiz-q { font-family:'Syne',sans-serif; font-size:17px; font-weight:600; color:#fff; line-height:1.5; margin-bottom:24px; }
  .options { display:flex; flex-direction:column; gap:10px; }
  .opt-btn {
    padding:14px 18px; border-radius:9px;
    border:1px solid var(--border);
    background:var(--surface);
    color:#ccc; cursor:pointer;
    text-align:left; font-size:13.5px;
    font-family:'Inter',sans-serif;
    transition:all .15s;
    display:flex; gap:12px; align-items:center;
  }
  .opt-btn:hover:not(.locked) { border-color:#555; background:var(--surface2); color:#fff; }
  .opt-btn .opt-letter { color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:12px; min-width:18px; }
  .opt-btn.correct { background:#052e16; border-color:var(--correct-border); color:#fff; }
  .opt-btn.wrong   { background:#450a0a; border-color:var(--wrong-border); color:#fff; }

  .explain-box {
    margin-top:16px; padding:14px 16px;
    border-radius:8px; font-size:13px; color:#ccc;
    border:1px solid; line-height:1.6;
  }
  .explain-box.good { background:#052e16; border-color:var(--correct-border); }
  .explain-box.bad  { background:#450a0a; border-color:var(--wrong-border); }
  .explain-label { font-weight:700; margin-right:6px; }

  .next-btn {
    margin-top:20px; width:100%;
    padding:13px; border-radius:9px;
    background:#fff; color:#0a0a0f;
    border:none; cursor:pointer;
    font-size:14px; font-weight:700;
    font-family:'Syne',sans-serif;
    transition:opacity .15s;
  }
  .next-btn:hover { opacity:.9; }

  /* Results */
  .results { text-align:center; padding:48px 24px; }
  .results .emoji { font-size:72px; margin-bottom:16px; }
  .results .score { font-family:'Syne',sans-serif; font-size:48px; font-weight:800; color:#fff; }
  .results .score-label { font-size:16px; color:var(--muted); margin-bottom:8px; }
  .results .score-msg { font-size:14px; color:var(--muted); margin:12px 0 28px; }
  .restart-btn {
    padding:12px 32px; border-radius:9px;
    background:#fff; color:#0a0a0f;
    border:none; cursor:pointer;
    font-size:15px; font-weight:700;
    font-family:'Syne',sans-serif;
  }

  /* ─── CHEATSHEET tab ─── */
  .cheatsheet { padding:28px 36px; max-width:960px; }
  .cs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
  .cs-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px; padding:16px;
  }
  .cs-card h3 { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; }
  .cs-table { width:100%; border-collapse:collapse; font-size:12px; }
  .cs-table td { padding:4px 6px; color:#bbb; }
  .cs-table td:first-child { font-family:'JetBrains Mono',monospace; color:#bd93f9; white-space:nowrap; }
  .cs-table tr:not(:last-child) td { border-bottom:1px solid var(--border); }

  /* page hide/show */
  .page { display:none; }
  .page.active { display:block; }
  .tab-guide .layout { display:flex; }

  @media(max-width:700px) {
    aside { display:none; }
    main, .cheatsheet { padding:20px 16px; }
    header { padding:20px 16px 0; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="course-tag">AI271 · SST · UMT</span>
    <h1>Programming for AI — Midterm Study Guide</h1>
  </div>
  <div class="subtitle">Notebooks 1–4 complete &nbsp;·&nbsp; Notebook 5 (before concat &amp; merge)</div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('guide')">📖 Study Guide</button>
    <button class="tab-btn" onclick="showTab('cheatsheet')">⚡ Cheat Sheet</button>
    <button class="tab-btn" onclick="showTab('quiz')">🧠 Practice Quiz</button>
  </div>
</header>

<!-- ══════════════════════════════════════
     STUDY GUIDE TAB
══════════════════════════════════════ -->
<div id="tab-guide" class="page active">
<div class="layout">
<aside id="sidebar"></aside>
<main id="main-content"></main>
</div>
</div>

<!-- ══════════════════════════════════════
     CHEAT SHEET TAB
══════════════════════════════════════ -->
<div id="tab-cheatsheet" class="page">
<div class="cheatsheet">
  <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:20px;">⚡ Quick Reference — Everything at a Glance</div>
  <div class="cs-grid" id="cheatsheet-grid"></div>
</div>
</div>

<!-- ══════════════════════════════════════
     QUIZ TAB
══════════════════════════════════════ -->
<div id="tab-quiz" class="page">
<div class="quiz-wrap" id="quiz-wrap"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════
const TOPICS = [
{
  id:'nb1', label:'Notebook 1', title:'Python Basics — Variables, Types & Operators', color:'#f97316',
  sections:[
    {
      h:'Variables & Data Types',
      body:`<span class="cm"># Variables — no type declaration needed</span>
x = 10          <span class="cm"># int</span>
name = <span class="st">"Ali"</span>    <span class="cm"># str</span>
pi = 3.14       <span class="cm"># float</span>
flag = <span class="kw">True</span>    <span class="cm"># bool</span>

<span class="cm"># Multiple assignment</span>
a, b, c = 1, 2, 3
x = y = z = 0   <span class="cm"># all get value 0</span>

<span class="cm"># Check type</span>
<span class="fn">type</span>(x)         <span class="ar">→ &lt;class 'int'&gt;</span>

<span class="cm"># Type conversion (casting)</span>
<span class="fn">int</span>(<span class="st">"5"</span>)          <span class="ar">→ 5</span>
<span class="fn">float</span>(<span class="st">"3.2"</span>)      <span class="ar">→ 3.2</span>
<span class="fn">str</span>(100)          <span class="ar">→ "100"</span>
<span class="fn">bool</span>(0)           <span class="ar">→ False</span>
<span class="fn">bool</span>(1)           <span class="ar">→ True</span>
<span class="fn">bool</span>(<span class="st">""</span>)          <span class="ar">→ False   (empty string is falsy!)</span>`,
      note:'bool(0) and bool("") are False. Everything else is True. Variables are case-sensitive: x ≠ X.'
    },
    {
      h:'Arithmetic Operators',
      body:`x = 7
y = 2

x + y   <span class="ar">→ 9</span>      <span class="cm"># addition</span>
x - y   <span class="ar">→ 5</span>      <span class="cm"># subtraction</span>
x * y   <span class="ar">→ 14</span>     <span class="cm"># multiplication</span>
x / y   <span class="ar">→ 3.5</span>    <span class="cm"># division — ALWAYS returns float</span>
x // y  <span class="ar">→ 3</span>      <span class="cm"># floor division — drops decimal</span>
x % y   <span class="ar">→ 1</span>      <span class="cm"># modulus — remainder</span>
x ** y  <span class="ar">→ 49</span>     <span class="cm"># exponentiation (7²)</span>

<span class="cm"># Handy tricks</span>
10 % 2 == 0   <span class="ar">→ True   (even number check)</span>
10 % 3        <span class="ar">→ 1      (remainder when dividing 10 by 3)</span>

<span class="cm"># Augmented assignment</span>
x += 1   <span class="cm"># same as x = x + 1</span>
x -= 1
x *= 2`,
      note:'/ always returns float (7/2 = 3.5). // floors toward negative infinity (not toward zero).'
    },
    {
      h:'Comparison & Logical Operators',
      body:`<span class="cm"># Comparison operators — return True or False</span>
5 == 5    <span class="ar">→ True</span>   <span class="cm"># equal</span>
5 != 3    <span class="ar">→ True</span>   <span class="cm"># not equal</span>
5 > 3     <span class="ar">→ True</span>   <span class="cm"># greater than</span>
5 < 3     <span class="ar">→ False</span>  <span class="cm"># less than</span>
5 >= 5    <span class="ar">→ True</span>   <span class="cm"># greater or equal</span>
3 <= 5    <span class="ar">→ True</span>   <span class="cm"># less or equal</span>

<span class="cm"># Logical operators</span>
<span class="kw">True</span>  <span class="kw">and</span> <span class="kw">False</span>  <span class="ar">→ False</span>   <span class="cm"># both must be True</span>
<span class="kw">True</span>  <span class="kw">or</span>  <span class="kw">False</span>  <span class="ar">→ True</span>    <span class="cm"># at least one True</span>
<span class="kw">not</span> <span class="kw">True</span>          <span class="ar">→ False</span>   <span class="cm"># flip it</span>

<span class="cm"># Chaining comparisons (Python-only feature!)</span>
1 < x < 10   <span class="cm"># True if x is between 1 and 10</span>`,
      note:'= is ASSIGNMENT. == is COMPARISON. Mixing them up is the #1 beginner mistake.'
    },
    {
      h:'Strings',
      body:`s = <span class="st">"Hello, World!"</span>

<span class="cm"># Common methods</span>
<span class="fn">len</span>(s)               <span class="ar">→ 13</span>
s.<span class="fn">upper</span>()            <span class="ar">→ "HELLO, WORLD!"</span>
s.<span class="fn">lower</span>()            <span class="ar">→ "hello, world!"</span>
s.<span class="fn">strip</span>()            <span class="cm"># remove leading/trailing spaces</span>
s.<span class="fn">replace</span>(<span class="st">"Hello"</span>,<span class="st">"Hi"</span>) <span class="ar">→ "Hi, World!"</span>
s.<span class="fn">split</span>(<span class="st">","</span>)         <span class="ar">→ ["Hello", " World!"]</span>
s.<span class="fn">startswith</span>(<span class="st">"He"</span>) <span class="ar">→ True</span>
s.<span class="fn">find</span>(<span class="st">"World"</span>)      <span class="ar">→ 7   (index where found)</span>

<span class="cm"># String indexing (same rules as lists!)</span>
s[0]   <span class="ar">→ "H"</span>
s[-1]  <span class="ar">→ "!"</span>
s[0:5] <span class="ar">→ "Hello"</span>

<span class="cm"># f-strings — the modern way to format</span>
name = <span class="st">"Ali"</span>
age = <span class="nm">20</span>
<span class="fn">print</span>(<span class="st">f"My name is {name} and I am {age}"</span>)
<span class="ar"># My name is Ali and I am 20</span>

<span class="cm"># Concatenation</span>
<span class="st">"Hello"</span> + <span class="st">" "</span> + <span class="st">"World"</span>  <span class="ar">→ "Hello World"</span>`,
      note:'Strings are IMMUTABLE — methods always return a NEW string, they never change the original.'
    },
    {
      h:'Input & Output',
      body:`<span class="cm"># Output</span>
<span class="fn">print</span>(<span class="st">"Hello"</span>)
<span class="fn">print</span>(<span class="st">"a ="</span>, a)
<span class="fn">print</span>(<span class="st">f"Value is {x:.2f}"</span>)  <span class="cm"># 2 decimal places</span>

<span class="cm"># Input — always returns a STRING</span>
name = <span class="fn">input</span>(<span class="st">"Enter name: "</span>)
age  = <span class="fn">int</span>(<span class="fn">input</span>(<span class="st">"Enter age: "</span>))   <span class="cm"># cast to int!</span>

<span class="cm"># print() options</span>
<span class="fn">print</span>(<span class="st">"a"</span>, <span class="st">"b"</span>, <span class="st">"c"</span>, sep=<span class="st">"-"</span>)  <span class="ar">→ a-b-c</span>
<span class="fn">print</span>(<span class="st">"hi"</span>, end=<span class="st">" "</span>)            <span class="cm"># no newline</span>`,
      note:'input() always returns a string. Always cast with int() or float() when you need numbers.'
    }
  ]
},
{
  id:'nb2', label:'Notebook 2', title:'Control Flow — Conditions, Loops & Functions', color:'#a855f7',
  sections:[
    {
      h:'if / elif / else',
      body:`score = <span class="nm">75</span>

<span class="kw">if</span> score >= <span class="nm">90</span>:
    <span class="fn">print</span>(<span class="st">"A"</span>)
<span class="kw">elif</span> score >= <span class="nm">80</span>:
    <span class="fn">print</span>(<span class="st">"B"</span>)
<span class="kw">elif</span> score >= <span class="nm">70</span>:
    <span class="fn">print</span>(<span class="st">"C"</span>)       <span class="ar"># ← this runs</span>
<span class="kw">else</span>:
    <span class="fn">print</span>(<span class="st">"F"</span>)

<span class="cm"># Ternary (one-liner)</span>
result = <span class="st">"pass"</span> <span class="kw">if</span> score >= <span class="nm">50</span> <span class="kw">else</span> <span class="st">"fail"</span>

<span class="cm"># Nested if</span>
<span class="kw">if</span> x > <span class="nm">0</span>:
    <span class="kw">if</span> x % <span class="nm">2</span> == <span class="nm">0</span>:
        <span class="fn">print</span>(<span class="st">"positive even"</span>)
    <span class="kw">else</span>:
        <span class="fn">print</span>(<span class="st">"positive odd"</span>)`,
      note:'Indentation is MANDATORY in Python — use 4 spaces. Missing/wrong indent = IndentationError.'
    },
    {
      h:'for Loop & range()',
      body:`<span class="cm"># range(stop)           → 0 to stop-1</span>
<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="nm">5</span>):
    <span class="fn">print</span>(i)    <span class="ar"># 0 1 2 3 4</span>

<span class="cm"># range(start, stop)     → start to stop-1</span>
<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="nm">1</span>, <span class="nm">6</span>):
    <span class="fn">print</span>(i)    <span class="ar"># 1 2 3 4 5</span>

<span class="cm"># range(start, stop, step)</span>
<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="nm">0</span>, <span class="nm">10</span>, <span class="nm">2</span>):
    <span class="fn">print</span>(i)    <span class="ar"># 0 2 4 6 8</span>

<span class="cm"># Loop over a list</span>
fruits = [<span class="st">"apple"</span>, <span class="st">"banana"</span>, <span class="st">"cherry"</span>]
<span class="kw">for</span> fruit <span class="kw">in</span> fruits:
    <span class="fn">print</span>(fruit)

<span class="cm"># enumerate — get index AND value</span>
<span class="kw">for</span> i, fruit <span class="kw">in</span> <span class="fn">enumerate</span>(fruits):
    <span class="fn">print</span>(i, fruit)   <span class="ar"># 0 apple  /  1 banana  /  2 cherry</span>`,
      note:'range(stop) is EXCLUSIVE — range(5) gives 0,1,2,3,4 (NOT 5). range is lazy — use list(range()) to see values.'
    },
    {
      h:'while, break & continue',
      body:`<span class="cm"># while loop</span>
count = <span class="nm">0</span>
<span class="kw">while</span> count < <span class="nm">5</span>:
    <span class="fn">print</span>(count)
    count += <span class="nm">1</span>    <span class="cm"># MUST increment or infinite loop!</span>

<span class="cm"># break — exit loop immediately</span>
<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="nm">10</span>):
    <span class="kw">if</span> i == <span class="nm">5</span>:
        <span class="kw">break</span>      <span class="cm"># stops when i = 5</span>
    <span class="fn">print</span>(i)    <span class="ar"># prints 0 1 2 3 4</span>

<span class="cm"># continue — skip current iteration, keep going</span>
<span class="kw">for</span> i <span class="kw">in</span> <span class="fn">range</span>(<span class="nm">6</span>):
    <span class="kw">if</span> i == <span class="nm">3</span>:

<span class="cm"># Boolean mask</span>

<span class="cm"># → [False, False, True, True, True]</span>

<span class="cm"># Multiple conditions (use & and |)</span>

<span class="cm"># Fancy indexing — pick specific indices</span>

<span class="cm"># 2D boolean</span>

m[m > <span class="nm">3</span>]             <span class="ar">→ [4, 5, 6]  (flattened!)</span>

<span class="cm"># np.where — conditional element selection</span>
np.<span class="fn">where</span>(a > <span class="nm">25</span>, a, <span class="nm">0</span>)  <span class="ar">→ [0, 0, 30, 40, 50]</span>
<span class="cm"># if condition → a, else → 0</span>`,

<span class="cm"># Element-wise (NOT like Python lists!)</span>
a + b    <span class="ar">→ [5, 7, 9]</span>

<span class="cm"># Universal functions</span>
np.<span class="fn">sqrt</span>(a)      <span class="ar">→ [1., 1.41, 1.73]</span>

np.<span class="fn">exp</span>(a)       <span class="cm"># e^x for each element</span>

np.<span class="fn">max</span>(a)        <span class="ar">→ 3</span>

    document.getElementById('tab-'+id).classList.toggle('active', id===t);
  });
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['guide','cheatsheet','quiz'][i]===t);
  });
  if(t==='quiz' && !quizDone) renderQuiz();
  if(t==='cheatsheet') renderCheatsheet();
}

// ══════════════════════════════════════════════════════════
// GUIDE RENDER
// ══════════════════════════════════════════════════════════
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = TOPICS.map((t,i)=>`
    <button class="nb-btn ${i===curTopicIdx?'active':''}"
      style="${i===curTopicIdx?`border-left-color:${t.color};`:''}color:${i===curTopicIdx?'#fff':''}"
      onclick="selectTopic(${i})">
      <div class="nb-label" style="color:${t.color}">${t.label}</div>
      <div class="nb-title">${t.title.split('—')[0].trim()}</div>
    </button>
  `).join('');
}

function renderMain() {
  const t = TOPICS[curTopicIdx];
  const s = t.sections[curSection];
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="topic-header">
      <div class="topic-nb-label" style="color:${t.color}">${t.label}</div>
      <div class="topic-title">${t.title}</div>
    </div>
    <div class="section-pills">
      ${t.sections.map((sec,i)=>`
        <button class="pill-btn ${i===curSection?'active':''}"
          style="${i===curSection?`border-color:${t.color};color:${t.color};background:${t.color}18`:''}"
          onclick="selectSection(${i})">${sec.h.split('—')[0].split('(')[0].trim()}</button>
      `).join('')}
    </div>
    <div class="section-heading" style="border-color:${t.color}">${s.h}</div>
    <div class="code-block">${s.body}</div>
    <div class="key-note" style="background:${t.color}12;border-color:${t.color}">
      <span class="kn-label" style="color:${t.color}">⚡ Key Note:</span>${s.note}
    </div>
    <div class="nav-footer">
      <button class="nav-btn" onclick="prevSection()" ${curSection===0&&curTopicIdx===0?'disabled':''}>← Prev</button>
      <span class="nav-progress">${curSection+1} / ${t.sections.length}</span>
      <button class="nav-btn primary" style="border-color:${t.color};color:${t.color}"
        onclick="nextSection()">
        ${curSection<t.sections.length-1?'Next →':(curTopicIdx<TOPICS.length-1?'Next Notebook →':'Done ✓')}
      </button>
    </div>
  `;
  main.scrollTop = 0;
}

function selectTopic(i) { curTopicIdx=i; curSection=0; renderSidebar(); renderMain(); }
function selectSection(i) { curSection=i; renderMain(); }
function nextSection() {
  if(curSection<TOPICS[curTopicIdx].sections.length-1){ curSection++; renderMain(); }
  else if(curTopicIdx<TOPICS.length-1){ curTopicIdx++; curSection=0; renderSidebar(); renderMain(); }
}
function prevSection() {
  if(curSection>0){ curSection--; renderMain(); }
  else if(curTopicIdx>0){ curTopicIdx--; curSection=TOPICS[curTopicIdx].sections.length-1; renderSidebar(); renderMain(); }
}

// ══════════════════════════════════════════════════════════
// QUIZ RENDER
// ══════════════════════════════════════════════════════════
function renderQuiz() {
  const wrap = document.getElementById('quiz-wrap');
  if(quizDone) {
    const pct = Math.round(score/quizOrder.length*100);
    wrap.innerHTML = `
      <div class="results">
        <div class="emoji">${score>=18?'🏆':score>=14?'💪':score>=10?'📈':'📚'}</div>
        <div class="score-label">Your score</div>
        <div class="score">${score}<span style="font-size:24px;color:var(--muted)">/${quizOrder.length}</span></div>
        <div class="score-msg">${pct}% — ${score>=18?'Excellent! You\'re exam ready! 🎯':score>=14?'Great job! Review the ones you missed.':score>=10?'Good progress! Keep studying the guide.':'Don\'t worry, go through the study guide and try again!'}</div>
        <button class="restart-btn" onclick="restartQuiz()">Try Again 🔄</button>
        <br><br>
        <button class="restart-btn" style="background:var(--surface);color:var(--text);border:1px solid var(--border)" onclick="showTab('guide')">Back to Study Guide</button>
      </div>`;
    return;
  }
  const q = quizOrder[quizIdx];
  const letters = 'ABCD';
  wrap.innerHTML = `
    <div class="quiz-meta">
      <span>Question ${quizIdx+1} of ${quizOrder.length}</span>
      <span>Score: ${score} / ${quizIdx}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${quizIdx/quizOrder.length*100}%"></div></div>
    <div class="quiz-q">${q.q}</div>
    <div class="options" id="opts">
      ${q.opts.map((o,i)=>`
        <button class="opt-btn" id="opt-${i}" onclick="pickAnswer(${i})">
          <span class="opt-letter">${letters[i]}.</span>${o}
        </button>
      `).join('')}
    </div>
    <div id="explain"></div>
    <div id="next-area"></div>
  `;
}

function pickAnswer(i) {
  if(chosen!==null) return;
  chosen=i;
  const q=quizOrder[quizIdx];
  if(i===q.ans) score++;
  document.querySelectorAll('.opt-btn').forEach(b=>b.classList.add('locked'));
  document.getElementById('opt-'+q.ans).classList.add('correct');
  if(i!==q.ans) document.getElementById('opt-'+i).classList.add('wrong');
  document.getElementById('explain').innerHTML=`
    <div class="explain-box ${i===q.ans?'good':'bad'}">
      <span class="explain-label" style="color:${i===q.ans?'#22c55e':'#ef4444'}">${i===q.ans?'✓ Correct!':'✗ Incorrect.'}</span>
      ${q.ex}
    </div>`;
  document.getElementById('next-area').innerHTML=`
    <button class="next-btn" onclick="nextQuestion()">
      ${quizIdx+1>=quizOrder.length?'See Results 🏆':'Next Question →'}
    </button>`;
}

function nextQuestion() {
  if(quizIdx+1>=quizOrder.length){ quizDone=true; renderQuiz(); return; }
  quizIdx++; chosen=null; renderQuiz();
}

function restartQuiz() {
  quizIdx=0; score=0; chosen=null; quizDone=false;
  quizOrder=[...QUIZ].sort(()=>Math.random()-.5);
  renderQuiz();
}
